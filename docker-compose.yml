name: rogue-ai

services:
  # ── FastAPI backend ────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-needriven/rogue-ai}-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - api-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DATABASE_PATH=/data/saves.db
      - TERM_TOKEN=${TERM_TOKEN:?TERM_TOKEN is required}
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://rogue:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@mongodb:27017/rogueai?authSource=admin
      - MONGO_DB=rogueai
      # ── API keys (managed here; UI settings are read-only when these are set) ──
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_USERNAME=${GITHUB_USERNAME:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK:-}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
    depends_on:
      - redis
      - mongodb
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - app-net

  # ── MongoDB ────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: rogue
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: rogueai
    networks:
      - app-net

  # ── Production web server ──────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-needriven/rogue-ai}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certs (mount after running init-ssl.sh)
      - ./ssl:/etc/ssl/app:ro
      # Certbot webroot for ACME challenges
      - certbot-webroot:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN:-}
    depends_on:
      - api
    networks:
      - app-net

  # ── Certbot (run manually to issue/renew certs) ────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Usage: docker compose run --rm certbot certonly ...
    profiles: ["certbot"]

volumes:
  certbot-webroot:
  api-data:
  redis-data:
  mongo-data:

networks:
  app-net:
    driver: bridge
