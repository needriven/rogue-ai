name: rogue-ai

services:
  # ── FastAPI backend ────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-needriven/rogue-ai}-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - api-data:/data
    environment:
      - DATABASE_PATH=/data/saves.db
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Production web server ──────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-needriven/rogue-ai}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certs (mount after running init-ssl.sh)
      - ./ssl:/etc/ssl/app:ro
      # Certbot webroot for ACME challenges
      - certbot-webroot:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN:-}
    depends_on:
      - api
    networks:
      - app-net

  # ── Certbot (run manually to issue/renew certs) ────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Usage: docker compose run --rm certbot certonly ...
    profiles: ["certbot"]

volumes:
  certbot-webroot:
  api-data:

networks:
  app-net:
    driver: bridge
