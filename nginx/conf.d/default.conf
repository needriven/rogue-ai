# Cloudflare → nginx (HTTP origin)
# Cloudflare handles TLS termination; nginx serves on port 80.
# Set Cloudflare SSL mode to "Full" for origin→CF encryption.

server {
    listen      80;
    listen [::]:80;
    server_name chans.place www.chans.place;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Block direct IP access (allow only CF traffic) ──
    # Cloudflare IPs are already listed in nginx.conf via set_real_ip_from
    # Optionally enforce CF-only: uncomment below
    # if ($http_cf_ray = "") { return 403; }

    # ── Security headers ──────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"           always;
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header X-XSS-Protection         "1; mode=block"        always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' wss://chans.place;"
      always;

    # ── Rate limiting ─────────────────────────────────
    limit_req   zone=global burst=50 nodelay;
    limit_conn  conn 20;

    # ── WebSocket relay → FastAPI backend ────────────
    location /ws/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API proxy → FastAPI backend ───────────────────
    location /api/ {
        limit_req  zone=api burst=20 nodelay;
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── SPA routing ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        limit_req  zone=static burst=200 nodelay;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Block dotfiles ────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
