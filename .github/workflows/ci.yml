name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Security audit ─────────────────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Security audit (high+critical)
        run: npm audit --audit-level=high

  # ── Type check ─────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: audit
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Build & push frontend image ────────────────────────────────────────
  build:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: [audit, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ── Build & push backend image ──────────────────────────────────────────
  build-api:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: [audit, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ── Deploy to OCI (main branch only) ───────────────────────────────────
  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    needs: [build, build-api]
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://chans.place

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key:      ${{ secrets.OCI_SSH_KEY }}
          port:     ${{ secrets.OCI_PORT || 22 }}
          envs:     GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,GITHUB_SHA
          script: |
            set -e
            cd ~/rogue-ai

            # Authenticate to GHCR
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Update image tag in env and pull
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$GITHUB_SHA|" .env
            export GITHUB_REPOSITORY="$GITHUB_REPOSITORY"
            export IMAGE_TAG="$GITHUB_SHA"

            docker compose pull web api
            docker compose up -d --no-build web api

            # Prune old images
            docker image prune -f --filter "until=72h"

            echo "Deployed: $GITHUB_SHA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
